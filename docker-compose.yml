services:
  pocketbase:
    build: ./pocketbase
    container_name: subpolar-pocketbase
    ports:
      - "8090:8090"
    environment:
      - POCKETBASE_EMAIL=${POCKETBASE_EMAIL:-admin@example.com}
      - POCKETBASE_PASSWORD=${POCKETBASE_PASSWORD:-adminpassword}
    volumes:
      - ./pocketbase/pb_data:/app/pb_data
      - ./pocketbase/pb_migrations:/app/pb_migrations
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TOOLS_CACHEBUST: ${TOOLS_CACHEBUST:-0}
    container_name: subpolar
    ports:
      - "5003:5003"
      - "5100:5100"
      - "5101:5101"
      - "5102:5102"
      - "5103:5103"
    environment:
      - AUTH_SECRET=${AUTH_SECRET}
      - POCKETBASE_URL=http://pocketbase:8090
      - POCKETBASE_EMAIL=${POCKETBASE_EMAIL:-admin@example.com}
      - POCKETBASE_PASSWORD=${POCKETBASE_PASSWORD:-adminpassword}
    volumes:
      - ./config.json:/app/config.json:ro
      - opencode-workspace:/workspace
      - opencode-data:/app/data
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

volumes:
  opencode-workspace:
    driver: local
  opencode-data:
    driver: local
